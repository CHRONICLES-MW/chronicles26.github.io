<!DOCTYPE html>
<html>
<head>
  <title>CHRONICLES TV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }

    .header {
      background: #111;
      padding: 15px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      color: red;
    }

    .status {
      text-align: center;
      font-size: 18px;
      margin: 10px;
    }

    .live { color: red; }
    .offline { color: gray; }

    .player {
      width: 100%;
      height: 75vh;
      border: none;
    }

    .countdown {
      text-align: center;
      font-size: 20px;
      margin: 10px;
      color: yellow;
    }

    .schedule {
      padding: 20px;
      background: #000;
    }

    .schedule h2 {
      color: red;
    }

    .footer {
      text-align: center;
      padding: 10px;
      background: #111;
      font-size: 14px;
      color: gray;
    }
  </style>
</head>

<body>

  <div class="header">CHRONICLES TV</div>

  <div id="status" class="status offline">● OFFLINE</div>

  <div id="countdown" class="countdown"></div>

  <iframe
    id="player"
    class="player"
    src="https://player.twitch.tv/?channel=chronicles26&parent=chronicles-mw.github.io"
    allowfullscreen>
  </iframe>

  <div class="schedule">
    <h2>PROGRAM SCHEDULE</h2>
    <p>07:00 – Morning Show</p>
    <p>12:00 – Entertainment Mix</p>
    <p>18:00 – Live Show</p>
    <p>20:00 – Highlights</p>
  </div>

  <div class="footer">
    CHRONICLES TV © 2026
  </div>

  <script>
    // SIMPLE LIVE CHECK (manual simulation)
    let isLive = false; // change to true when streaming

    const status = document.getElementById("status");

    if (isLive) {
      status.textContent = "🔴 LIVE NOW";
      status.className = "status live";
    } else {
      status.textContent = "● OFFLINE";
      status.className = "status offline";
    }

    // COUNTDOWN TO NEXT SHOW (example 18:00)
    function updateCountdown() {
      const now = new Date();
      const next = new Date();
      next.setHours(18,0,0);

      if (now > next) {
        next.setDate(next.getDate() + 1);
      }

      const diff = next - now;

      const hours = Math.floor(diff / (1000*60*60));
      const minutes = Math.floor((diff % (1000*60*60))/(1000*60));

      document.getElementById("countdown").textContent =
        "Next Show Starts In: " + hours + "h " + minutes + "m";
    }

    setInterval(updateCountdown, 60000);
    updateCountdown();
  </script>

</body>
</html>
