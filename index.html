<!DOCTYPE html>
<html>
<head>
  <title>Chronicles TV</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA SUPPORT -->
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      text-align: center;
    }

    #status {
      padding: 10px;
      font-size: 18px;
      font-weight: bold;
    }

    .live { color: red; }
    .offline { color: gray; }

    iframe {
      width: 100%;
      height: 70vh;
      border: none;
    }

    img {
      width: 100%;
      height: 70vh;
      object-fit: cover;
    }

    #program {
      padding: 10px;
      background: #111;
      font-size: 16px;
      color: #00ffcc;
    }
  </style>
</head>

<body>

  <div id="status">Loading...</div>

  <!-- PROGRAM INTELLIGENCE DISPLAY -->
  <div id="program">Loading schedule...</div>

  <div id="playerContainer"></div>

<script>

const channel = "chronicles26";
const parent = "chronicles-mw.github.io";

let lastState = null;

/* -----------------------------
   🎬 PROGRAM INTELLIGENCE SYSTEM
------------------------------*/

// Weekly schedule (edit freely)
const schedule = [
  { start: "06:00", end: "12:00", title: "🌅 Morning Worship & Inspiration" },
  { start: "12:00", end: "15:00", title: "📺 Midday Music Mix" },
  { start: "15:00", end: "18:00", title: "🎮 Youth & Gaming Hour" },
  { start: "18:00", end: "22:00", title: "🔥 Evening Live Show" },
  { start: "22:00", end: "06:00", title: "🌙 Night Replay / Auto Loop" }
];

function getCurrentProgram() {
  const now = new Date();
  const currentMinutes = now.getHours() * 60 + now.getMinutes();

  for (let slot of schedule) {
    let [sh, sm] = slot.start.split(":").map(Number);
    let [eh, em] = slot.end.split(":").map(Number);

    let start = sh * 60 + sm;
    let end = eh * 60 + em;

    // handles overnight slots
    if (end < start) {
      if (currentMinutes >= start || currentMinutes < end) return slot.title;
    } else {
      if (currentMinutes >= start && currentMinutes < end) return slot.title;
    }
  }

  return "📡 Default Programming";
}

function updateProgramDisplay() {
  document.getElementById("program").innerHTML =
    "📺 Now Showing: " + getCurrentProgram();
}

/* -----------------------------
   🔄 LIVE DETECTION SYSTEM
------------------------------*/

function checkLive() {
  const img = new Image();

  const testUrl =
    "https://static-cdn.jtvnw.net/previews-ttv/live_user_" +
    channel +
    ".jpg?rand=" +
    Date.now();

  img.src = testUrl;

  img.onload = function () {
    if (lastState !== "live") {
      showLive();
      lastState = "live";
    }
  };

  img.onerror = function () {
    if (lastState !== "offline") {
      showOffline();
      lastState = "offline";
    }
  };
}

/* -----------------------------
   🔴 LIVE MODE
------------------------------*/

function showLive() {
  document.getElementById("status").innerHTML = "🔴 LIVE NOW";
  document.getElementById("status").className = "live";

  document.getElementById("playerContainer").innerHTML = `
    <iframe
      src="https://player.twitch.tv/?channel=${channel}&parent=${parent}"
      allowfullscreen>
    </iframe>
  `;
}

/* -----------------------------
   ⚫ OFFLINE MODE + PROGRAM INFO
------------------------------*/

function showOffline() {
  document.getElementById("status").innerHTML = "⚫ OFFLINE";
  document.getElementById("status").className = "offline";

  document.getElementById("playerContainer").innerHTML = `
    <img src="offline-banner.png">
  `;
}

/* -----------------------------
   🔄 AUTO LOOP SYSTEM
------------------------------*/

setInterval(() => {
  checkLive();
  updateProgramDisplay();
}, 30000);

// initial run
checkLive();
updateProgramDisplay();

</script>

</body>
</html>
