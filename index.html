<!DOCTYPE html>
<html>
<head>
  <title>CHRONICLES TV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }

    .header {
      background: #111;
      padding: 10px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: red;
    }

    .live {
      text-align: center;
      color: red;
      font-weight: bold;
      margin: 10px;
    }

    .player {
      width: 100%;
      height: 80vh;
    }

    .schedule {
      padding: 20px;
      background: #000;
    }

    .schedule h2 {
      color: red;
    }
  </style>
</head>

<body>

  <div class="header">CHRONICLES TV</div>

  <div class="live">🔴 LIVE NOW</div>

  <iframe
    class="player"
    src="https://player.twitch.tv/?channel=chronicles26&parent=chronicles-mw.github.io"
    frameborder="0"
    allowfullscreen>
  </iframe>

  <div class="schedule">
    <h2>PROGRAM SCHEDULE</h2>
    <p>07:00 – Morning Show</p>
    <p>12:00 – Entertainment Mix</p>
    <p>18:00 – Live Show</p>
    <p>20:00 – Highlights</p>
  </div>

</body>
</html>
